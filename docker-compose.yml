version: '3.9'
services:
  overlay:
    build: .
    container_name: yahoo-fantasy-overlay
    ports:
      - "3030:3030"
    environment:
      PORT: 3030
      APP_BASE_URL: http://localhost:3030
      MOCK_MODE: "true"
    volumes:
      - ./config:/app/config
      - ./cache:/app/cache
    restart: unless-stopped
