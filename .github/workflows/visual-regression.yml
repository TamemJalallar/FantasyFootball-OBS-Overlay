name: Visual Regression Guard

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:
  workflow_dispatch:

jobs:
  visual-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify screenshot manifest
        run: npm run visual:check
